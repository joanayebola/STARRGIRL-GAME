<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#03020a"/>
      <stop offset="55%"  stop-color="#110620"/>
      <stop offset="100%" stop-color="#1c0c34"/>
    </linearGradient>
    <radialGradient id="glv" cx="18%" cy="35%" r="55%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glm" cx="82%" cy="72%" r="50%">
      <stop offset="0%"   stop-color="#d4005a" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#d4005a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="black" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.52"/>
    </radialGradient>
    <linearGradient id="t1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fdf4e8"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="t2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ff1a7c"/>
      <stop offset="100%" stop-color="#f0c040"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glv)"/>
  <rect width="1200" height="630" fill="url(#glm)"/>
  <rect width="1200" height="630" fill="url(#vig)"/>

  <!-- Scattered dot stars -->
  <circle cx="115"  cy="42"  r="1.5" fill="white" opacity="0.55"/>
  <circle cx="335"  cy="28"  r="1"   fill="white" opacity="0.35"/>
  <circle cx="578"  cy="52"  r="2"   fill="white" opacity="0.40"/>
  <circle cx="782"  cy="22"  r="1.5" fill="white" opacity="0.60"/>
  <circle cx="958"  cy="46"  r="1"   fill="white" opacity="0.35"/>
  <circle cx="1108" cy="32"  r="1.5" fill="white" opacity="0.45"/>
  <circle cx="55"   cy="195" r="1"   fill="white" opacity="0.40"/>
  <circle cx="1158" cy="178" r="1.5" fill="white" opacity="0.50"/>
  <circle cx="198"  cy="582" r="1.5" fill="white" opacity="0.35"/>
  <circle cx="448"  cy="600" r="1"   fill="white" opacity="0.50"/>
  <circle cx="700"  cy="590" r="2"   fill="white" opacity="0.38"/>
  <circle cx="900"  cy="610" r="1"   fill="white" opacity="0.32"/>
  <circle cx="1055" cy="584" r="1.5" fill="white" opacity="0.48"/>
  <circle cx="28"   cy="420" r="1"   fill="white" opacity="0.38"/>
  <circle cx="1172" cy="400" r="1.5" fill="white" opacity="0.32"/>
  <circle cx="475"  cy="98"  r="1"   fill="white" opacity="0.25"/>
  <circle cx="822"  cy="76"  r="1.5" fill="white" opacity="0.42"/>
  <circle cx="248"  cy="350" r="1"   fill="white" opacity="0.28"/>
  <circle cx="999"  cy="298" r="1"   fill="white" opacity="0.22"/>
  <circle cx="660"  cy="118" r="1"   fill="white" opacity="0.32"/>
  <circle cx="140"  cy="512" r="1.5" fill="white" opacity="0.28"/>
  <circle cx="1082" cy="440" r="1"   fill="white" opacity="0.22"/>
  <circle cx="380"  cy="540" r="1"   fill="white" opacity="0.30"/>
  <circle cx="920"  cy="155" r="1"   fill="white" opacity="0.28"/>

  <!-- Decorative 5-point stars -->
  <!-- Large violet star: center (98, 152), scale 46 -->
  <polygon
    points="0,-1 0.224,-0.307 0.951,-0.309 0.362,0.118 0.588,0.809 0,0.382 -0.588,0.809 -0.362,0.118 -0.951,-0.309 -0.224,-0.307"
    transform="translate(98,152) scale(46)"
    fill="#9b5de5" opacity="0.20"/>

  <!-- Small cream star: center (190, 66), scale 14 -->
  <polygon
    points="0,-1 0.224,-0.307 0.951,-0.309 0.362,0.118 0.588,0.809 0,0.382 -0.588,0.809 -0.362,0.118 -0.951,-0.309 -0.224,-0.307"
    transform="translate(190,66) scale(14)"
    fill="#c4b5fd" opacity="0.60"/>

  <!-- Large magenta star: center (1128, 508), scale 50 -->
  <polygon
    points="0,-1 0.224,-0.307 0.951,-0.309 0.362,0.118 0.588,0.809 0,0.382 -0.588,0.809 -0.362,0.118 -0.951,-0.309 -0.224,-0.307"
    transform="translate(1128,508) scale(50)"
    fill="#d4005a" opacity="0.18"/>

  <!-- Small gold star: center (1058, 568), scale 13 -->
  <polygon
    points="0,-1 0.224,-0.307 0.951,-0.309 0.362,0.118 0.588,0.809 0,0.382 -0.588,0.809 -0.362,0.118 -0.951,-0.309 -0.224,-0.307"
    transform="translate(1058,568) scale(13)"
    fill="#f0c040" opacity="0.70"/>

  <!-- Medium violet star: center (1150, 166), scale 22 -->
  <polygon
    points="0,-1 0.224,-0.307 0.951,-0.309 0.362,0.118 0.588,0.809 0,0.382 -0.588,0.809 -0.362,0.118 -0.951,-0.309 -0.224,-0.307"
    transform="translate(1150,166) scale(22)"
    fill="#c4b5fd" opacity="0.16"/>

  <!-- Tiny accent star: center (58, 382), scale 8 -->
  <polygon
    points="0,-1 0.224,-0.307 0.951,-0.309 0.362,0.118 0.588,0.809 0,0.382 -0.588,0.809 -0.362,0.118 -0.951,-0.309 -0.224,-0.307"
    transform="translate(58,382) scale(8)"
    fill="#c4b5fd" opacity="0.38"/>

  <!-- Eyebrow -->
  <text
    x="600" y="95"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="13"
    fill="#7a6b8a"
    letter-spacing="6">&#x2736;  AYRA STARR  &#x2736;</text>

  <!-- "Starr" -->
  <text
    x="600" y="265"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-weight="bold"
    font-size="185"
    fill="url(#t1)">Starr</text>

  <!-- Thin separator -->
  <line x1="445" y1="292" x2="755" y2="292" stroke="#3d1f6e" stroke-width="0.8" opacity="0.55"/>

  <!-- "Girl" -->
  <text
    x="600" y="453"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-weight="bold"
    font-size="185"
    fill="url(#t2)">Girl</text>

  <!-- Tagline -->
  <text
    x="600" y="548"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="12"
    fill="#7a6b8a"
    letter-spacing="3.5">CATCH THE STARS  &#xB7;  60 SECONDS  &#xB7;  GLOBAL LEADERBOARD</text>

  <!-- Bottom rule -->
  <line x1="492" y1="568" x2="708" y2="568" stroke="#3d1f6e" stroke-width="0.6" opacity="0.45"/>
</svg>
